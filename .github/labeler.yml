# Auto-label configuration for actions/labeler
# See https://github.com/actions/labeler#match-object for syntax

codebuild:
- changed-files:
  - any-glob-to-any-file: 'aidlc-rules/**'

documentation:
- changed-files:
  - any-glob-to-any-file:
    - '**/*.md'
    - 'docs/**'

workflows:
- changed-files:
  - any-glob-to-any-file: '.github/**'
